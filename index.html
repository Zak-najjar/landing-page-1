<!DOCTYPE html>
<html lang="ar" rtl>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="صفحة خاصة ب انطلاق موقع ما">
  <title>صفحة انطلاق</title>
  <link rel="stylesheet" href="assest/Bootstrap/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="text-center">
    <div class="brand">
      <div class="logo1">
        <img src="./imgs/logo1.png" alt="لوجو موبي جيم" class="mb-3 ps-3">
      </div>
      <div class="logo2">
        <img src="./imgs/logo2.png" alt="لوجو2 موبي جيم">
      </div>
    </div>
      <div class="texthead">
        <h1>أنتظروا إنطلاق التطبيق قريباً</h1>
        <p>هو ببساطة نص شكلي (بمعنى أن الغاية هي الشكل وليس المحتوى) ويُستخدم في صناعات المطابع</p>
      </div>
      <div class="countdown">
        <div class="counter">
          <span class="count-amount" id="months"></span>
          <span class="count-period">اشهر</span>
        </div>
        <div class="counter">
          <span class="count-amount" id="days"></span>
          <span class="count-period">ايام</span>
        </div>
        <div class="counter">
          <span class="count-amount" id="hours"></span>
          <span class="count-period">ساعات</span>
        </div>
        <div class="counter">
          <span class="count-amount" id="minutes"></span>
          <span class="count-period">دقائق</span>
        </div>
        <div class="counter">
          <span class="count-amount" id="seconds"></span>
          <span class="count-period">ثواني</span>
        </div>
      </div>
      <div class="emailNotification" >
        <p>هل تريد ارسال اشعار فور الانطلاق ؟</p>
        <form class="needs-validation" novalidate>
          <div class="input-group" > 
            <input type="email" class="form-control" placeholder="بريدك الاكتروني" required>
            <button type="submit" class="btn"><img src="./imgs/send1.png" alt="send"></button>
          </div>
          <div class="invalid-feedback">
            عذرا يرجى ادخال بريد الكتروني
          </div>
        </form>
      </div>
  </header>
  <main>

  </main>

  <footer>

  </footer>
  <script src="assest/Bootstrap/js/bootstrap.min.js"></script>
  <script src="js/index.js"></script>
  weqweqweqweqwe
ewqeqweq
</body>
</html>
